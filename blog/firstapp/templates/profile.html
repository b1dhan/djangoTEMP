{% extends 'firstapp/index.html' %}

{% block content %}
<div class="container mt-4" style="max-width: 500px;">
    <h2>My Profile</h2>
    <table class="table">
        <tr>
            <th>Username</th>
            <td>{{ user.username }}</td>
        </tr>
        <tr>
            <th>Email</th>
            <td>{{ user.email|default:"Not provided" }}</td>
        </tr>
        <tr>
            <th>Date joined</th>
            <td>{{ user.date_joined|date:"F j, Y" }}</td>
        </tr>
        <tr>
            <th>Last login</th>
            <td>{{ user.last_login|date:"F j, Y, g:i a" }}</td>
        </tr>
    </table>
    <a href="{% url 'password_change' %}" class="btn btn-outline-secondary btn-sm">Change Password</a>
</div>
{% endblock %}
