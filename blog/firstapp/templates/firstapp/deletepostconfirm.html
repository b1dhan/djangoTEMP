{% extends 'firstapp/index.html' %}

{% block content %}
<h2>Delete "{{ post.title }}"?</h2>
<form method="post">
    {% csrf_token %}
    <button type="submit" class="btn btn-sm btn-outline-danger">Yes, Delete</button>
    <a href="{% url 'post_detail' post.id %}" class="btn btn-sm btn-outline-primary">Cancel</a>
</form>
{% endblock %}
