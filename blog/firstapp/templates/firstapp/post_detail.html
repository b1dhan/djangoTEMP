{%extends "firstapp/index.html"%}

{%if post%}
{%block title%}{{post.title}}{%endblock title%}
{%else%}
<div>Post Detail</div>
{%endif%}

{%block content%}
{%if post%}
<div>
    <h2>{{post.title}}</h2>
</div>
<div>
    <h5>{{post.author}}</h5>
</div>
<div>
    <p>{{post.content}}</p>
</div>
<div>
    <a href="{%url 'edit_post' post.id %}">Edit</a>
    <a href="">Delete</a>
</div>
{%else%}
<div>
    post with id: {{post.id}} doesnt exist
</div>.
{%endif%}
{%endblock content%}
